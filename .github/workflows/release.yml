name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (required for manual dispatch)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            target_name: linux-x86_64
            ext: ""
            archive_ext: tar.gz
            shell: bash
          - os: macos-latest
            target: x86_64-apple-darwin
            target_name: macos-x86_64
            ext: ""
            archive_ext: tar.gz
            shell: bash
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            target_name: windows-x86_64
            ext: ".exe"
            archive_ext: zip
            shell: pwsh
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "No release tag resolved. Use a tag push (refs/tags/vX.Y.Z) or workflow_dispatch input `tag`."
            exit 1
          fi
          if ! [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag '${RELEASE_TAG}'. Expected semver style like v1.2.3."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binary and templates
        shell: ${{ matrix.shell }}
        env:
          TAG_NAME: ${{ env.RELEASE_TAG }}
          TARGET_NAME: ${{ matrix.target_name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          if ("${{ runner.os }}" -eq "Windows") {
            $version = $env:TAG_NAME -replace "^v",""
            $bundleName = "codex-foreman-$version-$env:TARGET_NAME"
            $bundlePath = "dist/$bundleName"
            $archive = "dist/$bundleName.$env:ARCHIVE_EXT"
            New-Item -ItemType Directory -Force -Path $bundlePath | Out-Null
            Copy-Item "target/$env:TARGET/release/codex-foreman$env:EXT" "$bundlePath/"
            Copy-Item "templates" -Recurse -Destination "$bundlePath/"
            Compress-Archive -Path "$bundlePath" -DestinationPath $archive
            $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
            "${hash}  $(Split-Path $archive -Leaf)" | Set-Content "$archive.sha256"
          } else {
            set -euo pipefail
            version="${TAG_NAME#v}"
            bundle="codex-foreman-${version}-${TARGET_NAME}"
            archive="dist/codex-foreman-${version}-${TARGET_NAME}.${ARCHIVE_EXT}"
            mkdir -p "dist/$bundle"
            cp "target/${TARGET}/release/codex-foreman${EXT}" "dist/$bundle/"
            cp -r templates "dist/$bundle/"
            tar -czf "$archive" -C dist "$bundle"
            sha256sum "$archive" > "$archive.sha256"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: package-${{ matrix.target_name }}
          path: dist/*
          retention-days: 14
          if-no-files-found: error

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: none
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "No release tag resolved. Use a tag push (refs/tags/vX.Y.Z) or workflow_dispatch input `tag`."
            exit 1
          fi
          if ! [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag '${RELEASE_TAG}'. Expected semver style like v1.2.3."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: package-*
          merge-multiple: true
          path: dist

      - name: Collect release assets
        run: |
          ls -la dist
          find dist -maxdepth 1 -type f -name 'codex-foreman-*'

      - name: Extract release notes from changelog
        env:
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          import os
          import re
          from pathlib import Path

          tag = os.environ["TAG_NAME"]
          if not tag:
              raise RuntimeError(
                  "No tag provided. Re-run with workflow_dispatch input `tag` set, "
                  "or trigger by pushing a `v*` tag."
              )
          version = tag.lstrip("v")
          changelog = Path("CHANGELOG.md").read_text()

          def section_for(heading: str):
              pattern = re.compile(
                  rf"(?ms)^## {re.escape(heading)}\\s*$\\n(.*?)(?=^## |\\Z)",
                  re.MULTILINE,
              )
              match = pattern.search(changelog)
              return match.group(1).strip() if match else None

          notes = section_for(f"v{version}")
          title = f"## v{version}"
          source = f"`{title}` section in `CHANGELOG.md`"
          if notes is None:
              notes = section_for("Unreleased")
              title = "## Unreleased"
              source = "`## Unreleased` section in `CHANGELOG.md`"

          if not notes:
              raise RuntimeError("No release notes found in CHANGELOG.md")

          Path("release-notes.md").write_text(
              "# codex-foreman " + tag + "\n\n"
              f"Release notes generated from {source}.\n\n"
              + title + "\n\n"
              + notes + "\n"
          )

      - name: Publish release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: codex-foreman ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            dist/codex-foreman-*.tar.gz
            dist/codex-foreman-*.tar.gz.sha256
            dist/codex-foreman-*.zip
            dist/codex-foreman-*.zip.sha256
